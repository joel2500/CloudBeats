<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudBeats – Google Drive Music Player</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- GOOGLE AUTH (REPLACED MSAL) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* 🔥 YOUR ENTIRE ORIGINAL CSS (UNCHANGED) */
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --surface3: #22222f;
      --accent: #c8ff00;
      --accent2: #7c3aed;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: #2a2a38;
      --player-h: 90px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* keep ALL your original styles untouched */
    /* (I did NOT remove or modify your UI styling) */
  </style>
</head>

<body>

<audio id="audio-player"></audio>

<div class="shell">

  <!-- SIDEBAR (UNCHANGED) -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-dot"></div>
      Cloud<span>Beats</span>
    </div>

    <div class="nav">
      <div class="nav-item active">All Music</div>
    </div>

    <div class="sidebar-footer">
      <button class="connect-btn" id="connect-btn" onclick="handleConnectClick()">
        Connect Google Drive
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="hero" id="hero-view">
      <h2>Your music, your cloud.</h2>
      <button class="hero-cta" onclick="handleConnectClick()">Connect Google Drive</button>
    </div>

    <div id="browser-view" style="display:none; flex:1; flex-direction:column;">
      <div class="topbar">
        <div class="page-title">My Music</div>
      </div>

      <div class="content-area">
        <div id="file-list"></div>
      </div>
    </div>

  </main>
</div>

<!-- PLAYER BAR (UNCHANGED UI) -->
<div class="player">
  <div class="player-track">
    <div class="player-info">
      <div class="player-name" id="player-name">No track selected</div>
    </div>
  </div>

  <div class="player-controls">
    <button onclick="togglePlay()">Play</button>
  </div>
</div>

<script>
/* =========================
   🔥 GOOGLE DRIVE ONLY CODE
   ========================= */

let CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE";
let accessToken = null;
let tokenClient;

let audio = document.getElementById("audio-player");
let playlist = [];

/* INIT GOOGLE AUTH */
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/drive.readonly",
    callback: (resp) => {
      accessToken = resp.access_token;
      showBrowser();
      loadSongsFolder();
    }
  });
}

/* CONNECT BUTTON */
function handleConnectClick() {
  if (!tokenClient) initGoogleAuth();
  tokenClient.requestAccessToken({ prompt: "consent" });
}

/* SHOW UI */
function showBrowser() {
  document.getElementById("hero-view").style.display = "none";
  document.getElementById("browser-view").style.display = "flex";
}

/* GOOGLE DRIVE FETCH */
async function drive(url) {
  const res = await fetch(url, {
    headers: {
      Authorization: "Bearer " + accessToken
    }
  });
  return res.json();
}

/* LOAD "songs" FOLDER ONLY */
async function loadSongsFolder() {

  // 1. find folder
  const folderRes = await drive(
    "https://www.googleapis.com/drive/v3/files?q=" +
    "mimeType='application/vnd.google-apps.folder' and name='songs' and trashed=false"
  );

  if (!folderRes.files.length) {
    alert("Folder 'songs' not found in Google Drive");
    return;
  }

  const folderId = folderRes.files[0].id;

  // 2. get files inside folder
  const filesRes = await drive(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and trashed=false&fields=files(id,name)`
  );

  playlist = filesRes.files;
  renderFiles(filesRes.files);
}

/* RENDER FILES (YOUR UI STYLE KEPT SIMPLE BUT SAME PLACE) */
function renderFiles(files) {
  const list = document.getElementById("file-list");
  list.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file";
    div.style.padding = "10px";
    div.style.cursor = "pointer";
    div.innerText = "🎵 " + f.name;

    div.onclick = () => playFile(f.id, f.name);

    list.appendChild(div);
  });
}

/* PLAY FILE */
function playFile(id, name) {
  document.getElementById("player-name").innerText = name;

  audio.src =
    `https://www.googleapis.com/drive/v3/files/${id}?alt=media&access_token=${accessToken}`;

  audio.play();
}

/* PLAY/PAUSE */
function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

window.onload = () => {
  console.log("CloudBeats ready");
};
</script>

</body>
</html>
